<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Felipe & Natália | Lista de Presentes</title>

<meta name="description"
content="Lista de presentes do casamento de Felipe e Natália.">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header id="topo">

<div class="overlay">

<div class="cabecalho">

<h1 id="nomesNoivos">

Felipe & Natália

</h1>

<p id="mensagemPrincipal">

Carregando mensagem...

</p>

<a href="#presentes">

<button class="botaoPrincipal">

Escolher um Presente

</button>

</a>

</div>

</div>

</header>

<section id="historia">

<div class="container">

<h2>Nossa História</h2>

<p id="textoHistoria">

Em breve...

</p>

</div>

</section>



<section id="presentes">

<div class="container">

<h2>Lista de Presentes</h2>

<p>

Muito obrigado por fazer parte deste momento tão especial.

</p>

<input

type="text"

id="pesquisa"

placeholder="Pesquisar presente...">

<div id="listaPresentes">

<!-- Os presentes serão criados pelo JavaScript -->

</div>

</div>

</section>

<footer>

<div class="container">

<h2>

Obrigado pelo carinho ❤️

</h2>

<p>

Esperamos comemorar esse dia tão especial ao lado de vocês.

</p>

<p>

Felipe & Natália

</p>

</div>

</footer>

<!-- Modal -->

<div id="modal" class="modal">

<div class="modalConteudo">

<span id="fecharModal">

&times;

</span>

<div id="conteudoModal">

</div>

</div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/script.js"></script>

<div id="modalPresente" class="modal">

    <div class="modalConteudo">

        <span class="fecharModal" onclick="fecharModal()">&times;</span>

        <img id="modalImagem" class="modalImagem" src="" alt="">

        <h2 id="modalNome"></h2>

        <p id="modalValor" class="modalValor"></p>

        <div class="modalBotoes">

            <button onclick="abrirQRCode()">
                Ver QR Code
            </button>

            <button onclick="copiarPix()">
                PIX Copia e Cola
            </button>

        </div>

        <hr>

        <label>Nome</label>

        <input
            type="text"
            id="nomeConvidado"
            placeholder="Digite seu nome">

        <label>WhatsApp</label>

        <input
            type="text"
            id="whatsappConvidado"
            placeholder="(66) 99999-9999">

        <label>Mensagem (opcional)</label>

        <textarea
            id="mensagemConvidado"
            rows="4"></textarea>

        <button
            class="botaoConfirmar"
            onclick="confirmarPagamento()">

            Já realizei o pagamento

        </button>

    </div>

</div>

</body>

</html>
